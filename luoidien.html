<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC - Công cụ Vẽ Lưới điện Giao chéo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #sidebar { width: 350px; background: #f4f4f4; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1001; display: flex; flex-direction: column; }
        #map { flex-grow: 1; }
        textarea { width: 100%; height: 300px; margin-top: 10px; font-family: monospace; font-size: 11px; border: 1px solid #ccc; padding: 5px; }
        button { background: #d32f2f; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #b71c1c; }
        .instructions { font-size: 12px; color: #666; margin-bottom: 10px; }
        h2 { font-size: 18px; margin: 0 0 10px 0; color: #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>VDC Safety Map</h2>
    <p class="instructions">Copy toàn bộ bảng tọa độ từ Excel và dán vào bên dưới:</p>
    <textarea id="dataInput" placeholder="MA_TUYEN	TEN_TRU	LAT	LONG	LOAI_DIEM
AKHTTN	1	10.745832	106.739254	TRU_DO..."></textarea>
    <button onclick="processData()">VẼ LƯỚI ĐIỆN</button>
    <div id="status" style="margin-top: 10px; font-size: 13px; color: green; font-weight: bold;"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([10.75, 106.7], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OSM'
    }).addTo(map);

    let layers = [];

    function processData() {
        // Xóa các lớp cũ trên bản đồ
        layers.forEach(layer => map.removeLayer(layer));
        layers = [];

        const input = document.getElementById('dataInput').value.trim();
        if (!input) return alert("Vui lòng dán dữ liệu!");

        const rows = input.split('\n');
        const header = rows[0].split(/\t|,/); // Nhận diện tab hoặc phẩy
        
        // Tìm chỉ số các cột
        const idxTuyen = header.findIndex(h => h.includes("MA_TUYEN"));
        const idxTru = header.findIndex(h => h.includes("TEN_TRU"));
        const idxLat = header.findIndex(h => h.includes("LAT"));
        const idxLong = header.findIndex(h => h.includes("LONG"));

        if (idxLat === -1 || idxLong === -1) {
            return alert("Không tìm thấy cột LAT hoặc LONG!");
        }

        const groups = {};
        const bounds = [];

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(/\t|,/);
            if (cols.length < 2) continue;

            const tuyen = cols[idxTuyen]?.trim() || "KHONG_TEN";
            const tru = cols[idxTru]?.trim() || "N/A";
            const lat = parseFloat(cols[idxLat]);
            const lng = parseFloat(cols[idxLong]);

            if (isNaN(lat) || isNaN(lng)) continue;

            const pos = [lat, lng];
            bounds.push(pos);

            // Gom nhóm theo tuyến để nối dây
            if (!groups[tuyen]) groups[tuyen] = [];
            groups[tuyen].push(pos);

            // Vẽ Marker cho trụ
            const marker = L.circleMarker(pos, {
                radius: 4, fillColor: "#ff3300", color: "#000", weight: 1, fillOpacity: 0.8
            }).addTo(map).bindPopup(`<b>Tuyến:</b> ${tuyen}<br><b>Trụ:</b> ${tru}`);
            layers.push(marker);
        }

        // Vẽ các tuyến dây (Polyline)
        for (let tuyen in groups) {
            const polyline = L.polyline(groups[tuyen], {
                color: 'blue', weight: 3, opacity: 0.5
            }).addTo(map);
            layers.push(polyline);
        }

        if (bounds.length > 0) {
            map.fitBounds(bounds);
            document.getElementById('status').innerText = `Đã vẽ ${bounds.length} trụ điện!`;
        }
    }
</script>

</body>
</html>
