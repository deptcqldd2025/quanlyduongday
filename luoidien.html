<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC - Bản đồ Giao chéo Lưới điện</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* Sidebar có thể thu gọn */
        #sidebar { 
            width: 350px; background: #fff; padding: 20px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.2); 
            z-index: 2000; transition: all 0.4s ease;
            display: flex; flex-direction: column;
            position: relative;
        }
        #sidebar.collapsed { margin-left: -350px; }

        /* Nút đóng/mở sidebar */
        #toggleBtn {
            position: absolute; right: -45px; top: 10px;
            width: 35px; height: 35px; background: #d32f2f;
            color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 20px; z-index: 2001;
        }

        #map { flex-grow: 1; height: 100vh; transition: all 0.4s ease; }
        textarea { width: 100%; height: 60%; margin-top: 10px; font-family: monospace; font-size: 11px; }
        button.main-btn { 
            background: #d32f2f; color: white; border: none; 
            padding: 15px; margin-top: 10px; cursor: pointer; 
            font-weight: bold; border-radius: 4px; 
        }
        .status-msg { margin-top: 10px; color: #2e7d32; font-weight: bold; font-size: 13px; }
        h2 { font-size: 18px; margin: 0; color: #d32f2f; }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="toggleBtn" onclick="toggleSidebar()">☰</button>
    <h2>VDC SAFETY TOOL</h2>
    <p style="font-size: 12px; color: #666;">Dán dữ liệu Excel (MA_TUYEN, LAT, LONG...) vào đây:</p>
    <textarea id="dataInput" placeholder="Copy từ Excel và dán vào đây..."></textarea>
    <button class="main-btn" onclick="processData()">VẼ & XEM BẢN ĐỒ</button>
    <div id="status" class="status-msg"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Khởi tạo bản đồ
    const map = L.map('map').setView([10.75, 106.7], 13);
    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let layers = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        // Cập nhật lại kích thước map sau khi sidebar ẩn
        setTimeout(() => { map.invalidateSize(); }, 400);
    }

    function processData() {
        const input = document.getElementById('dataInput').value.trim();
        if (!input) {
            alert("Vui lòng dán dữ liệu trước!");
            return;
        }

        // Xóa dữ liệu cũ
        layers.forEach(l => map.removeLayer(l));
        layers = [];

        const rows = input.split('\n');
        const header = rows[0].split(/\t|,/);
        
        const idxTuyen = header.findIndex(h => h.toUpperCase().includes("TUYEN"));
        const idxLat = header.findIndex(h => h.toUpperCase().includes("LAT"));
        const idxLong = header.findIndex(h => h.toUpperCase().includes("LONG") || h.toUpperCase().includes("LNG"));

        if (idxLat === -1 || idxLong === -1) {
            alert("Không tìm thấy tiêu đề LAT, LONG trong dữ liệu!");
            return;
        }

        const groups = {};
        const bounds = [];

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(/\t|,/);
            if (cols.length < 2) continue;

            const lat = parseFloat(cols[idxLat]);
            const lng = parseFloat(cols[idxLong]);
            const tuyen = cols[idxTuyen]?.trim() || "Chung";

            if (!isNaN(lat) && !isNaN(lng)) {
                const pos = [lat, lng];
                bounds.push(pos);
                if (!groups[tuyen]) groups[tuyen] = [];
                groups[tuyen].push(pos);

                const m = L.circleMarker(pos, {radius: 4, color: 'red'}).addTo(map);
                layers.push(m);
            }
        }

        // Vẽ dây
        for (let t in groups) {
            const p = L.polyline(groups[t], {color: 'blue', weight: 3}).addTo(map);
            layers.push(p);
        }

        if (bounds.length > 0) {
            map.fitBounds(bounds);
            document.getElementById('status').innerText = `Đã hiển thị ${bounds.length} điểm!`;
            
            // TỰ ĐỘNG CHUYỂN VỀ HIỂN THỊ MAPS (Ẩn sidebar)
            setTimeout(() => {
                toggleSidebar();
            }, 500); 
        }
    }
</script>

</body>
</html>
