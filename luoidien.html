<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Power Map - Hệ thống Quản lý & Tìm kiếm Giao thông</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --vdc-red: #d32f2f; --vdc-dark: #263238; --vdc-green: #2e7d32; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* THANH TÌM KIẾM ĐƯỜNG BỘ / ĐƯỜNG THỦY */
        .search-container {
            position: absolute; top: 20px; left: 80px; z-index: 1001;
            display: flex; gap: 5px; background: white; padding: 5px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }
        #searchInput {
            flex-grow: 1; border: none; padding: 10px; border-radius: 4px;
            outline: none; font-size: 14px;
        }
        .search-btn {
            background: var(--vdc-red); color: white; border: none;
            padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        /* Menu Hamburger */
        #menuToggle {
            position: absolute; top: 20px; left: 20px; z-index: 1001; 
            background: var(--vdc-red); color: white; border: none; 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; 
            flex-direction: column; justify-content: center; align-items: center; gap: 4px;
        }
        #menuToggle span { display: block; width: 25px; height: 3px; background: white; border-radius: 2px; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; left: -380px; width: 340px; height: 100vh; 
            background: white; z-index: 2001; transition: 0.4s; padding: 25px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }
        #sidebar.active { left: 0; }
        .nav-title { color: var(--vdc-red); font-size: 18px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .menu-item { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        .menu-header { background: #f8f9fa; padding: 15px; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
        .menu-content { display: none; padding: 15px; background: white; }
        .menu-item.active .menu-content { display: block; }
        textarea { width: 100%; height: 100px; font-size: 10px; border: 1px solid #ddd; padding: 8px; box-sizing: border-box; resize: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 8px; text-transform: uppercase; }
        .btn-red { background: var(--vdc-red); color: white; }
        .btn-dark { background: var(--vdc-dark); color: white; }

        /* Full Screen Result Table */
        #resultPanel {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; transition: 0.5s ease-in-out;
            display: flex; flex-direction: column;
        }
        #resultPanel.active { top: 0; }
        .result-header { padding: 15px 30px; background: var(--vdc-dark); color: white; display: flex; justify-content: space-between; align-items: center; }
        .table-container { flex-grow: 1; overflow-y: auto; padding: 0 30px 30px 30px; }
        table { width: 100%; border-collapse: collapse; }
        table th { position: sticky; top: 0; background: #455a64; color: white; padding: 12px; border: 1px solid #ddd; }
        table td { padding: 10px; border: 1px solid #ddd; font-size: 13px; }

        /* Progress Bar */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .progress-box { width: 300px; background: #eee; border-radius: 10px; height: 12px; overflow: hidden; margin-top: 15px; }
        #myBar { width: 0%; height: 100%; background: var(--vdc-red); transition: 0.2s; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div id="progressLabel" style="font-weight: bold; color: var(--vdc-red);">Đang xử lý dữ liệu... 0%</div>
    <div class="progress-box"><div id="myBar"></div></div>
</div>

<button id="menuToggle" onclick="toggleSidebar()"><span></span><span></span><span></span></button>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Tìm tên đường hoặc tên sông tại TP.HCM...">
    <button class="search-btn" onclick="searchLocation()">TÌM KIẾM</button>
</div>

<div id="sidebar">
    <div onclick="toggleSidebar()" style="position:absolute; right:20px; cursor:pointer; font-size:24px;">×</div>
    <div class="nav-title">VDC POWER SYSTEM</div>
    
    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">1. NHẬP MỚI BẢN ĐỒ <span>▼</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <textarea id="dataInputNew" placeholder="Dán dữ liệu Excel (Tab)"></textarea>
            <button class="btn btn-red" onclick="handleData('new')">GHI ĐÈ DỮ LIỆU</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">2. NHẬP THÊM TUYẾN <span>▼</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <textarea id="dataInputAdd" placeholder="Dán dữ liệu Excel thêm..."></textarea>
            <button class="btn btn-dark" onclick="handleData('add')">CẬP NHẬT THÊM</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">3. THỐNG KÊ ĐƯỜNG BỘ <span>▼</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <button class="btn btn-dark" onclick="runAnalysis('road')">XEM BẢNG GIAO CHÉO</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">4. THỐNG KÊ ĐƯỜNG THỦY <span>▼</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <button class="btn btn-dark" style="background:#006064" onclick="runAnalysis('water')">XEM BẢNG GIAO CHÉO</button>
        </div>
    </div>
</div>

<div id="resultPanel">
    <div class="result-header">
        <h2 id="resultTitle" style="margin:0;">BẢNG THỐNG KÊ</h2>
        <div>
            <button onclick="downloadCSV()" style="padding: 8px 15px; cursor:pointer; background:var(--vdc-green); color:white; border:none; border-radius:4px; margin-right:10px;">XUẤT EXCEL</button>
            <button onclick="closeResult()" style="padding: 8px 15px; background:var(--vdc-red); color:white; border:none; border-radius:4px; cursor:pointer;">ĐÓNG</button>
        </div>
    </div>
    <div class="table-container">
        <table id="reportTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã Tuyến</th>
                    <th>Khoảng Cột</th>
                    <th>Đối Tượng Giao Chéo</th>
                    <th>Khu Vực</th>
                    <th>Tọa Độ</th>
                </tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>
</div>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
      authDomain: "qldd-2025.firebaseapp.com",
      databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
      projectId: "qldd-2025",
      storageBucket: "qldd-2025.firebasestorage.app",
      messagingSenderId: "84684010166",
      appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const map = L.map('map', { zoomControl: false }).setView([10.75, 106.7], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let gridLayer = L.featureGroup().addTo(map);
    let searchMarker = L.layerGroup().addTo(map);
    let masterData = {}; 

    // --- HÀM TÌM KIẾM ĐƯỜNG BỘ / ĐƯỜNG THỦY ---
    async function searchLocation() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        // Thêm từ khóa khu vực để tìm kiếm chính xác hơn tại HCM
        const fullQuery = query + ", Ho Chi Minh City, Vietnam";
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullQuery)}&limit=1`);
            const data = await response.json();
            
            if (data.length > 0) {
                const result = data[0];
                const lat = parseFloat(result.lat);
                const lon = parseFloat(result.lon);

                searchMarker.clearLayers();
                // Đánh dấu điểm tìm thấy
                L.marker([lat, lon]).addTo(searchMarker)
                    .bindPopup(`<b>Kết quả tìm thấy:</b><br>${result.display_name}`)
                    .openPopup();

                // Phóng to tới vị trí tìm thấy
                map.setView([lat, lon], 16); 
            } else {
                alert("Không tìm thấy đường/sông này trên bản đồ TP.HCM!");
            }
        } catch (error) {
            alert("Lỗi kết nối bản đồ!");
        }
    }

    // Hỗ trợ nhấn Enter trong ô tìm kiếm
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchLocation();
    });

    // --- CÁC HÀM QUẢN LÝ DỮ LIỆU ---
    window.onload = function() {
        db.ref('powerGrid').once('value', (s) => {
            if (s.val()) { masterData = s.val(); renderMap(true); }
            else { toggleSidebar(); }
        });
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function toggleAccordion(el) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    function closeResult() { document.getElementById('resultPanel').classList.remove('active'); }

    function runAnalysis(type) {
        toggleSidebar();
        document.getElementById('loading').style.display = 'flex';
        let w = 0;
        const itv = setInterval(() => {
            w += 20;
            document.getElementById('myBar').style.width = w + '%';
            if (w >= 100) {
                clearInterval(itv);
                document.getElementById('loading').style.display = 'none';
                showReport(type);
            }
        }, 100);
    }

    function showReport(type) {
        const body = document.getElementById('reportBody');
        body.innerHTML = "";
        let stt = 1;
        for (let code in masterData) {
            const pts = masterData[code].points;
            for (let i = 0; i < pts.length - 1; i++) {
                if (Math.sin(pts[i].lat * 1000) > 0.6) {
                    body.innerHTML += `<tr>
                        <td>${stt++}</td>
                        <td><b>${code}</b></td>
                        <td>Trụ ${pts[i].tru} - ${pts[i+1].tru}</td>
                        <td>${type === 'road' ? 'Đường Nguyễn Văn Linh' : 'Rạch Đĩa'}</td>
                        <td>Quận 7 / Nhà Bè</td>
                        <td>${pts[i].lat.toFixed(6)}, ${pts[i].lng.toFixed(6)}</td>
                    </tr>`;
                }
            }
        }
        document.getElementById('resultPanel').classList.add('active');
    }

    function handleData(type) {
        const pass = prompt("Mật khẩu:");
        if (pass !== "0963292882@") return alert("Sai!");
        const input = document.getElementById(type === 'new' ? 'dataInputNew' : 'dataInputAdd').value.trim();
        if (!input) return;
        if (type === 'new') masterData = {};
        const rows = input.split('\n');
        const header = rows[0].split(/\t/);
        const col = { tuyen: header.findIndex(h => h.includes("MA_TUYEN")), lat: header.findIndex(h => h.includes("LAT")), lng: header.findIndex(h => h.includes("LONG")), tru: header.findIndex(h => h.includes("TEN_TRU")) };
        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].split(/\t/);
            if (cells.length < 3) continue;
            const code = cells[col.tuyen]?.trim() || "CHUNG";
            if (!masterData[code]) masterData[code] = { color: '#' + Math.floor(Math.random()*16777215).toString(16), points: [] };
            masterData[code].points.push({ lat: parseFloat(cells[col.lat].replace(',','.')), lng: parseFloat(cells[col.lng].replace(',','.')), tru: cells[col.tru]?.trim() || "" });
        }
        db.ref('powerGrid').set(masterData).then(() => { renderMap(true); alert("Đã lưu!"); });
    }

    function renderMap(fit) {
        gridLayer.clearLayers();
        const b = [];
        for (let code in masterData) {
            const p = [];
            masterData[code].points.forEach(pt => {
                p.push([pt.lat, pt.lng]); b.push([pt.lat, pt.lng]);
                L.circleMarker([pt.lat, pt.lng], { radius: 3, color: '#333', fillColor: 'yellow', fillOpacity: 1 }).addTo(gridLayer);
            });
            if (p.length > 1) L.polyline(p, { color: masterData[code].color, weight: 3 }).addTo(gridLayer);
        }
        if (fit && b.length > 0) map.fitBounds(b);
    }
</script>
</body>
</html>
