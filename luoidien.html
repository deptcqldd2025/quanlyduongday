<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Power Map - Secure Cloud</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --vdc-red: #d32f2f; --vdc-dark: #2c3e50; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        #menuToggle {
            position: absolute; top: 20px; left: 20px;
            z-index: 1001; background: var(--vdc-red);
            color: white; border: none; padding: 12px 18px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #sidebar {
            position: fixed; top: 0; left: -350px;
            width: 320px; height: 100vh; background: white;
            z-index: 1002; transition: 0.4s; padding: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }
        #sidebar.active { left: 0; }
        .menu-item { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .menu-item h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
        textarea { width: 100%; height: 150px; font-size: 10px; border: 1px solid #ccc; padding: 8px; box-sizing: border-box; font-family: monospace; }
        .btn-group { display: flex; gap: 5px; margin-top: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-new { background: var(--vdc-red); }
        .btn-add { background: var(--vdc-dark); }
        .btn-stat { background: #f39c12; width: 100%; margin-top: 5px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .legend { position: absolute; bottom: 30px; right: 20px; background: white; padding: 10px; border-radius: 4px; z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.1); font-size: 11px; max-height: 200px; overflow-y: auto; border-left: 4px solid var(--vdc-red); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: none; justify-content: center; align-items: center; font-weight: bold; color: var(--vdc-red); flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--vdc-red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    ĐANG ĐỒNG BỘ DỮ LIỆU VDC...
</div>

<button id="menuToggle" onclick="toggleSidebar()">☰ QUẢN LÝ LƯỚI ĐIỆN</button>

<div id="sidebar">
    <div onclick="toggleSidebar()" style="text-align:right; cursor:pointer; font-size:24px; color: #ccc;">×</div>
    <h2 style="color: var(--vdc-red); margin-top:0;">Hệ thống VDC</h2>
    
    <div class="menu-item">
        <h3>NHẬP DỮ LIỆU TỪ EXCEL</h3>
        <textarea id="dataInput" placeholder="Copy các cột MA_TUYEN, TEN_TRU, LAT, LONG và dán vào đây..."></textarea>
        <div class="btn-group">
            <button class="btn btn-new" onclick="handleDataUpload(true)">NHẬP MỚI</button>
            <button class="btn btn-add" onclick="handleDataUpload(false)">NHẬP THÊM</button>
        </div>
    </div>

    <div class="menu-item">
        <h3>PHÂN TÍCH GIAO CHÉO</h3>
        <button class="btn btn-stat" onclick="alert('Tính năng đang được cấu hình với lớp nền bản đồ...')">Thống kê ĐƯỜNG BỘ</button>
        <button class="btn btn-stat" onclick="alert('Tính năng đang được cấu hình với lớp nền bản đồ...')">Thống kê ĐƯỜNG THỦY</button>
    </div>
</div>

<div id="map"></div>
<div id="legend" class="legend" style="display:none"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map', { zoomControl: false }).setView([10.75, 106.7], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let powerGrid = L.featureGroup().addTo(map);
    let masterData = {}; 

    window.onload = function() {
        showLoading(true);
        db.ref('powerGrid').once('value', (snapshot) => {
            const val = snapshot.val();
            if (val) { masterData = val; renderMap(); }
            showLoading(false);
        });
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    // HÀM KIỂM TRA MẬT KHẨU TRƯỚC KHI XỬ LÝ
    function handleDataUpload(isNew) {
        const password = prompt("Vui lòng nhập mật khẩu để thay đổi dữ liệu hệ thống:");
        if (password === "0963292882") {
            processData(isNew);
        } else {
            alert("Sai mật khẩu! Bạn không có quyền thay đổi dữ liệu.");
        }
    }

    function processData(isNew) {
        const input = document.getElementById('dataInput').value.trim();
        if (!input) return alert("Vui lòng dán dữ liệu!");

        if (isNew) masterData = {};

        const rows = input.split('\n');
        const header = rows[0].split(/\t/);
        
        const idxTuyen = header.findIndex(h => h.includes("MA_TUYEN"));
        const idxLat = header.findIndex(h => h.includes("LAT"));
        const idxLng = header.findIndex(h => h.includes("LONG"));
        const idxTru = header.findIndex(h => h.includes("TEN_TRU"));

        if (idxLat === -1 || idxLng === -1) return alert("Dữ liệu không đúng định dạng Excel (Thiếu LAT/LONG)");

        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].split(/\t/);
            if (cells.length < 3) continue;

            const tuyen = cells[idxTuyen]?.trim() || "CHUNG";
            if (!masterData[tuyen]) {
                masterData[tuyen] = { 
                    color: '#' + Math.floor(Math.random()*16777215).toString(16), 
                    points: [] 
                };
            }
            
            masterData[tuyen].points.push({
                lat: parseFloat(cells[idxLat].replace(',','.')),
                lng: parseFloat(cells[idxLng].replace(',','.')),
                tru: cells[idxTru]?.trim() || "N/A"
            });
        }

        showLoading(true);
        db.ref('powerGrid').set(masterData).then(() => {
            renderMap();
            showLoading(false);
            toggleSidebar();
            document.getElementById('dataInput').value = "";
            alert("Cập nhật dữ liệu thành công!");
        });
    }

    function renderMap() {
        powerGrid.clearLayers();
        const allPoints = [];
        for (let t in masterData) {
            const pts = masterData[t].points.map(p => {
                allPoints.push([p.lat, p.lng]);
                
                L.circleMarker([p.lat, p.lng], {
                    radius: 3, color: '#333', weight: 1, fillColor: 'yellow', fillOpacity: 1
                }).bindPopup(`<b>Tuyến:</b> ${t}<br><b>Trụ:</b> ${p.tru}`).addTo(powerGrid);
                
                return [p.lat, p.lng];
            });

            if (pts.length > 1) {
                L.polyline(pts, { color: masterData[t].color, weight: 3, opacity: 0.7 }).addTo(powerGrid);
            }
        }
        if (allPoints.length > 0) map.fitBounds(allPoints, {padding: [50,50]});
        updateLegend();
    }

    function updateLegend() {
        const leg = document.getElementById('legend');
        leg.style.display = "block";
        leg.innerHTML = "<b>DANH SÁCH TUYẾN</b><hr>";
        for (let t in masterData) {
            leg.innerHTML += `<div style="margin-bottom:3px;"><i style="background:${masterData[t].color}; width:12px; height:3px; display:inline-block; vertical-align:middle; margin-right:5px;"></i> ${t}</div>`;
        }
    }
</script>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</body>
</html>
