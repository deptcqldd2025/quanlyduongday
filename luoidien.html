<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Power Map Management</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --vdc-red: #d32f2f; --vdc-dark: #263238; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #e8eaed; }

        /* Menu Button */
        #menuToggle {
            position: absolute; top: 20px; left: 20px;
            z-index: 1001; background: var(--vdc-red);
            color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px;
        }

        /* Sidebar Sidebar */
        #sidebar {
            position: fixed; top: 0; left: -380px;
            width: 340px; height: 100vh; background: white;
            z-index: 1002; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }
        #sidebar.active { left: 0; }
        .close-sidebar { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; color: #aaa; }
        .nav-title { color: var(--vdc-red); font-size: 18px; font-weight: 800; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }

        /* Accordion Menu */
        .menu-item { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        .menu-header { 
            background: #f8f9fa; padding: 15px; cursor: pointer; 
            font-size: 13px; font-weight: bold; color: #333;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .menu-header:hover { background: #f1f1f1; color: var(--vdc-red); }
        .menu-content { display: none; padding: 15px; background: white; border-top: 1px solid #eee; }
        .menu-item.active .menu-content { display: block; }
        .menu-item.active .menu-header { background: #eee; color: var(--vdc-red); }

        textarea { 
            width: 100%; height: 120px; font-family: monospace; font-size: 10px; 
            border: 1px solid #ddd; padding: 8px; box-sizing: border-box; 
            resize: none; border-radius: 4px; background: #fff;
        }
        
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 4px; 
            cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 8px;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-red { background: var(--vdc-red); color: white; }
        .btn-dark { background: var(--vdc-dark); color: white; }

        .legend { position: absolute; bottom: 30px; right: 20px; background: white; padding: 15px; border-radius: 8px; z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.1); font-size: 11px; max-height: 250px; overflow-y: auto; border-left: 4px solid var(--vdc-red); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: var(--vdc-red); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--vdc-red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div>ĐANG XỬ LÝ...</div>

<button id="menuToggle" onclick="toggleSidebar()">☰ MENU HỆ THỐNG</button>

<div id="sidebar">
    <div class="close-sidebar" onclick="toggleSidebar()">×</div>
    <div class="nav-title">VDC Power Map</div>
    
    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">1. NHẬP MỚI LƯỚI ĐIỆN <span>+</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <textarea id="dataInputNew" placeholder="Dán dữ liệu Excel thay thế toàn bộ..."></textarea>
            <button class="btn btn-red" onclick="handleAction('new')">GHI ĐÈ DỮ LIỆU CLOUD</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">2. NHẬP THÊM TUYẾN MỚI <span>+</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <textarea id="dataInputAdd" placeholder="Dán dữ liệu các tuyến bổ sung..."></textarea>
            <button class="btn btn-dark" onclick="handleAction('add')">CẬP NHẬT THÊM</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">3. GIAO CHÉO ĐƯỜNG BỘ <span>+</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <p style="font-size: 11px; color: #666;">Hệ thống sẽ quét các điểm cắt giữa dây điện và đường bộ.</p>
            <button class="btn btn-dark" onclick="closeAndNotify('ĐƯỜNG BỘ')">BẮT ĐẦU THỐNG KÊ</button>
        </div>
    </div>

    <div class="menu-item" onclick="toggleAccordion(this)">
        <div class="menu-header">4. GIAO CHÉO ĐƯỜNG THỦY <span>+</span></div>
        <div class="menu-content" onclick="event.stopPropagation()">
            <p style="font-size: 11px; color: #666;">Hệ thống sẽ quét các điểm cắt qua sông ngòi, kênh rạch.</p>
            <button class="btn btn-dark" onclick="closeAndNotify('ĐƯỜNG THỦY')">BẮT ĐẦU THỐNG KÊ</button>
        </div>
    </div>

    <div id="status" style="font-size:11px; margin-top:10px;"></div>
</div>

<div id="map"></div>
<div id="legend" class="legend" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
      authDomain: "qldd-2025.firebaseapp.com",
      databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
      projectId: "qldd-2025",
      storageBucket: "qldd-2025.firebasestorage.app",
      messagingSenderId: "84684010166",
      appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
      measurementId: "G-7E5BDTCSEZ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const map = L.map('map', { zoomControl: false }).setView([10.75, 106.7], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let gridLayer = L.featureGroup().addTo(map);
    let masterData = {}; 

    // Mở/Đóng các mục trong menu
    function toggleAccordion(element) {
        const isActive = element.classList.contains('active');
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        if (!isActive) element.classList.add('active');
    }

    window.onload = function() {
        showLoading(true);
        db.ref('powerGrid').once('value', (snapshot) => {
            const val = snapshot.val();
            showLoading(false);
            if (val) {
                masterData = val;
                renderMap(true);
            } else {
                toggleSidebar();
                document.getElementById('status').innerHTML = "<b>⚠️ Cloud trống. Hãy dùng mục 1.</b>";
            }
        });
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    function closeAndNotify(type) {
        toggleSidebar();
        setTimeout(() => alert("Đang phân tích giao chéo " + type + "..."), 300);
    }

    function handleAction(type) {
        const pass = prompt("Nhập mật khẩu quản trị:");
        if (pass !== "0963292882@") return alert("Mật khẩu sai!");

        const inputId = type === 'new' ? 'dataInputNew' : 'dataInputAdd';
        const input = document.getElementById(inputId).value.trim();
        if (!input) return alert("Vui lòng dán dữ liệu!");

        toggleSidebar();
        showLoading(true);
        if (type === 'new') masterData = {};

        const rows = input.split('\n');
        const header = rows[0].split(/\t/);
        const col = {
            tuyen: header.findIndex(h => h.toUpperCase().includes("MA_TUYEN")),
            lat: header.findIndex(h => h.toUpperCase().includes("LAT")),
            lng: header.findIndex(h => h.toUpperCase().includes("LONG")),
            tru: header.findIndex(h => h.toUpperCase().includes("TEN_TRU"))
        };

        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].split(/\t/);
            if (cells.length < 3) continue;
            const code = cells[col.tuyen]?.trim() || "CHUNG";
            const lat = parseFloat(cells[col.lat].replace(',', '.'));
            const lng = parseFloat(cells[col.lng].replace(',', '.'));
            if (!isNaN(lat) && !isNaN(lng)) {
                if (!masterData[code]) masterData[code] = { color: '#' + Math.floor(Math.random()*16777215).toString(16), points: [] };
                masterData[code].points.push({ lat, lng, tru: cells[col.tru]?.trim() || "" });
            }
        }

        db.ref('powerGrid').set(masterData).then(() => {
            renderMap(true);
            showLoading(false);
            document.getElementById(inputId).value = "";
        });
    }

    function renderMap(fit) {
        gridLayer.clearLayers();
        const bounds = [];
        for (let code in masterData) {
            const pts = [];
            masterData[code].points.forEach(p => {
                pts.push([p.lat, p.lng]);
                bounds.push([p.lat, p.lng]);
                L.circleMarker([p.lat, p.lng], { radius: 3, color: '#333', fillColor: 'yellow', fillOpacity: 1 }).bindPopup(`Tuyến: ${code}<br>Trụ: ${p.tru}`).addTo(gridLayer);
            });
            if (pts.length > 1) L.polyline(pts, { color: masterData[code].color, weight: 3 }).addTo(gridLayer);
        }
        if (fit && bounds.length > 0) map.fitBounds(bounds, {padding: [50, 50]});
        updateLegend();
    }

    function updateLegend() {
        const leg = document.getElementById('legend');
        leg.style.display = "block";
        leg.innerHTML = "<b style='color:var(--vdc-red)'>TUYẾN DÂY:</b><hr>";
        for (let t in masterData) {
            leg.innerHTML += `<div><i style="background:${masterData[t].color}; width:12px; height:3px; display:inline-block; vertical-align:middle; margin-right:5px;"></i> ${t}</div>`;
        }
    }
</script>
</body>
</html>
